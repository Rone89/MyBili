name: Build Unsigned IPA

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag, for example v0.1.0
        required: true
        default: v0.1.0
      release_name:
        description: Release name
        required: true
        default: BiliFlow v0.1.0
      release_notes:
        description: Release notes
        required: false
        default: First feature release generated by GitHub Actions.

permissions:
  contents: write

jobs:
  build-release:
    runs-on: macos-26

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release metadata
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "RELEASE_TAG=${{ github.event.inputs.release_tag }}" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=${{ github.event.inputs.release_name }}" >> "$GITHUB_ENV"
            echo "RELEASE_NOTES<<EOF" >> "$GITHUB_ENV"
            echo "${{ github.event.inputs.release_notes }}" >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          else
            echo "RELEASE_TAG=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "RELEASE_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
            echo "RELEASE_NOTES<<EOF" >> "$GITHUB_ENV"
            echo "Automated build from tag ${GITHUB_REF_NAME}." >> "$GITHUB_ENV"
            echo "EOF" >> "$GITHUB_ENV"
          fi

      - name: Verify Xcode 26
        shell: bash
        run: |
          xcodebuild -version
          VERSION="$(xcodebuild -version | awk '/Xcode/{print $2}')"
          if [[ "${VERSION}" != 26* ]]; then
            echo "Expected Xcode 26.x, got ${VERSION}"
            exit 1
          fi

      - name: Install XcodeGen
        shell: bash
        run: brew install xcodegen

      - name: Generate project
        shell: bash
        run: xcodegen generate

      - name: Build unsigned app
        shell: bash
        run: |
          xcodebuild \
            -project BiliFlow.xcodeproj \
            -scheme BiliFlow \
            -configuration Release \
            -destination "generic/platform=iOS" \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package IPA
        shell: bash
        run: |
          APP_PATH="$(find build/DerivedData/Build/Products/Release-iphoneos -maxdepth 1 -name '*.app' -print -quit)"
          if [[ -z "${APP_PATH}" ]]; then
            echo "Unable to locate built .app product"
            exit 1
          fi

          mkdir -p build/Payload
          cp -R "${APP_PATH}" build/Payload/
          (
            cd build
            zip -qry "BiliFlow-${RELEASE_TAG}.ipa" Payload
          )

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          ASSET_PATH="build/BiliFlow-${RELEASE_TAG}.ipa"

          if gh release view "${RELEASE_TAG}" >/dev/null 2>&1; then
            gh release upload "${RELEASE_TAG}" "${ASSET_PATH}" --clobber
            gh release edit "${RELEASE_TAG}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}"
          else
            gh release create "${RELEASE_TAG}" "${ASSET_PATH}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}"
          fi
